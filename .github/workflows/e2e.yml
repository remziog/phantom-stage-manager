name: E2E

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  playwright:
    name: Playwright (login, redirect, quote creation, smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      # Backend (used by both the seed/teardown scripts and the built app).
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      # Test-account credentials.
      E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_OPERATOR_EMAIL: ${{ secrets.E2E_OPERATOR_EMAIL }}
      E2E_OPERATOR_PASSWORD: ${{ secrets.E2E_OPERATOR_PASSWORD }}
      # Stable slug so the seed script can find + clear prior fixtures.
      E2E_COMPANY_SLUG: e2e-test-co
      E2E_COMPANY_NAME: E2E Test Co

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download previous preflight snapshot (for diff)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: preflight-report
          workflow: e2e.yml
          branch: ${{ github.event.repository.default_branch }}
          path: preflight-baseline
          if_no_artifact_found: warn

      - name: Preflight — verify Supabase schema matches seed script
        env:
          PREFLIGHT_BASELINE_PATH: preflight-baseline/schema-snapshot.json
          # Fail CI only on actual regressions (newly missing tables/columns/enums).
          # Use "any" to also fail on additions, "none" to disable diff-based failures.
          PREFLIGHT_FAIL_ON: regressions
        run: npm run test:e2e:preflight

      - name: Upload preflight schema snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report
          path: preflight-report/
          retention-days: 14
          if-no-files-found: warn

      - name: Seed Supabase test data
        run: npm run test:e2e:seed

      - name: Build app
        run: npm run build

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Tear down Supabase test data
        if: always()
        run: npm run test:e2e:teardown
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 14
